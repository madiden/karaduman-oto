# DISABLED: Suanda manuel `npm run deploy` kullaniliyor (bkz. .claude/skills/deploy/SKILL.md).
# Bu workflow yalnizca workflow_dispatch ile manuel tetiklenir; main'e push'larda calismaz.
# Aktif etmek icin:
#   1) GitHub repo secrets ekle: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID,
#      NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
#   2) Asagidaki `on:` bolumunde `push: { branches: [main] }` satirini geri ac.
#   3) GitHub Actions billing'in aktif oldugundan emin ol (public repo'da ucretsiz).
name: Deploy to Cloudflare Workers

on:
  # push:
  #   branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build OpenNext bundle
        run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
